# 自动构建并发布安装包（Windows + macOS）
# 使用方法：git tag v1.0.0 && git push --tags
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content src-tauri/tauri.conf.json) -replace '"version": ".*"', '"version": "' + $tag + '"' | Set-Content src-tauri/tauri.conf.json

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true

  build-macos:
    name: Build macOS (x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VER\"/" src-tauri/tauri.conf.json

      - name: Install deps
        run: npm install

      - name: Build
        run: npm run tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
