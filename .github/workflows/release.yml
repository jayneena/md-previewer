# 自动构建并发布安装包（Windows + macOS）
# 使用方法：git tag v1.0.0 && git push --tags
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));j.version='${{ github.ref_name }}'.replace(/^v/,'');fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(j,null,2)+'\n')"

      - name: Install NSIS (Windows)
        run: npm install -g @tauri-apps/cli

      - name: Install deps
        run: npm install

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true

  build-macos:
    name: Build macOS (x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));j.version='${{ github.ref_name }}'.replace(/^v/,'');fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(j,null,2)+'\n')"

      - name: Install deps
        run: npm install

      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run tauri build

      - name: Upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
