name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));j.version='${{ github.ref_name }}'.replace(/^v/,'');fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(j,null,2)+'\n')"

      - name: Install deps
        run: npm install

      - name: Build app
        run: npm run tauri build

      - name: Upload to release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title $tag --notes "自动构建" src-tauri/target/release/bundle/nsis/*.exe src-tauri/target/release/bundle/msi/*.msi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS (x64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable

      - name: Sync version from tag
        run: node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8'));j.version='${{ github.ref_name }}'.replace(/^v/,'');fs.writeFileSync('src-tauri/tauri.conf.json',JSON.stringify(j,null,2)+'\n')"

      - name: Install deps
        run: npm install

      - name: Build app
        run: npm run tauri build

      - name: Upload to release
        run: gh release create ${{ github.ref_name }} --title ${{ github.ref_name }} --notes "自动构建" src-tauri/target/release/bundle/dmg/*.dmg
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
