<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD文件预览器 · 桌面增强版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.0/github-markdown.min.css">
</head>
<body>
<div class="app-bar">
    <button id="sidebarToggleBtn" class="sidebar-toggle" title="切换侧边栏">☰</button>
    <div class="file-info" id="fileInfoDisplay">📭 未打开文件 — 拖拽或点击打开</div>
    <div class="btn-group">
        <button id="openFileBtn" class="btn-primary">📂 打开 .md 文件</button>
        <button id="editToggleBtn" class="btn-primary">✏️ 编辑</button>
        <button id="saveBtn" style="display:none">💾 保存</button>
        <button id="themeToggleBtn" class="btn-theme" style="display:none" title="切换深色/浅色">🌓</button>
        <button id="translateBtn" class="btn-translate" hidden="true">🌐 英→中</button>
        <button id="exampleBtn" hidden="true">✨ 示例文档 </button>
        <button id="selectTemplateBtn" class="btn-template">📋 选择doc模版导出</button>
    </div>
</div>
<div class="main-container">
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">打开的文件</div>
        <div class="sidebar-list" id="sidebarList"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="content-area" id="contentArea">
        <div class="view-wrapper" id="previewWrapper">
            <div class="preview-content markdown-body" id="previewArea">
                <div class="empty-guide">
                    <div class="big-icon">📄✨</div>
                    <h3>MD 文件预览器</h3>
                    <p>拖拽 <strong>.md / .markdown</strong> 文件至此窗口<br>或点击上方「打开 .md 文件」选择文档</p>
                    <p style="font-size: 13px; margin-top: 16px;">💡 快捷键 <kbd>⌘/Ctrl + O</kbd> 唤起文件选择</p>
                </div>
            </div>
        </div>
        <div class="view-wrapper" id="editorWrapper" style="display:none">
            <div id="editorContainer"></div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast">✨ 就绪</div>

<!-- 导出确认弹窗 -->
<div id="exportModal" class="modal-overlay" style="display:none">
  <div class="modal-dialog">
    <div class="modal-header">导出 DOCX</div>
    <div class="modal-body">
      <div class="modal-info">
        <span class="modal-label">模版文件：</span>
        <span id="modalTemplateName" class="modal-value"></span>
      </div>
      <div class="modal-field">
        <span class="modal-label">保存位置：</span>
        <div class="modal-path-row">
          <input id="modalExportPath" class="modal-input" type="text" readonly>
          <button id="modalBrowseBtn" class="modal-btn-browse">浏览</button>
        </div>
      </div>
      <div class="modal-field">
        <span class="modal-label">文件名：</span>
        <div class="modal-path-row">
            <input id="modalExportName" class="modal-input" type="text">
        <div>
      </div>
    </div>
    <div class="modal-actions">
      <button id="modalCancelBtn" class="modal-btn modal-btn-cancel">取消</button>
      <button id="modalConfirmBtn" class="modal-btn modal-btn-confirm">导出为 DOCX 格式</button>
    </div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
